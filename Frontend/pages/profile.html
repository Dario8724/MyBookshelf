<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MyBookshelf - Perfil</title>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/profile.css">
    </head>
    <body>

        <nav>
            <a href="profile.html" class="logo-text">My<span class="logo-det">B</span>ookshelf</a>
            
            <div class="nav-center">
                <a href="feed.html" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Feed</span>
                </a>
                <a href="clubs.html" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    <span>Clubes</span>
                </a>
                <a href="search.html" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>Buscar</span>
                </a>
                <a href="following.html" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Seguindo</span>
                </a>
            </div>

            <div class="nav-right">
                <a href="profile.html" class="nav-avatar" id="navAvatar">G</a>
                <button class="btn-logout" onclick="logout()" title="Sair">
                    <svg width="18" heidht="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>    
                </button>
            </div>
        </nav>

        <div class="page">

            <!--Cabeçalho perfil-->
            <div class="card" id="profileCard">
                <div class="profile-header" id="profileHeader">
                    <div class="skel-avatar skeleton"></div>
                    <div style="flex:1">
                        <div class="skel-line skeleton" style="width:50%;height:20px;margin-bottom:10px;"></div>
                        <div class="skel-line skeleton" style="width:35%"></div>
                    </div>
                </div>
            </div>

            <!--Conquistas-->
            <div class="card" id="achievementsCard" style="display:none">
                <div class="section-title">🏆 Conquistas</div>
                <div class="achievements-grid" id="achievementsGrid"></div>
            </div>

            <!--Metas de leitura-->
            <div class="card" id="goalsCard" style="display:none">
                <div class="section-title">🎯 Metas de Leitura</div>
                <div class="goals-list" id="goalsList"></div>
            </div>

            <!--Biblioteca com tabs-->
            <div class="tabs" id="librarySection" style="display:none;">
                <div class="tab list">
                    <button class="tab-btn active" data-tab="all">Todos <span id="cntAll">(0)</span></button>
                    <button class="tab-btn" data-tab="reading">A ler <span id="cntReading">(0)</span></button>
                    <button class="tab-btn" data-tab="completed">Lidos <span id="cntCompleted">(0)</span></button>
                    <button class="tab-btn" data-tab="want_to_read">Quero ler <span id="cntWant">(0)</span></button>
                    <button class="tab-btn" data-tab="favorites">Favoritos <span id="cntFav">(0)</span></button>
                </div>

                <div class="tab-panel active" id="tab-all"></div>
                <div class="tab-panel" id="tab-reading"></div>
                <div class="tab-panel" id="tab-completed"></div>
                <div class="tab-panel" id="tab-want_to_read"></div>
                <div class="tab-panel" id="tab-favorites">
            </div>

        </div>

        <!-- Editar perfil-->
         <div class="overlay" id="editOverlay">
            <div class="modal">
                <div class="modal-title">Editar Perfil</div>
                <div class="modal-sub">Alterar o teu nome, bio ou foto de perfil.</div>

                <div class="field">
                    <label>Foto de Perfil</label>
                    <div class="field-avatar-preview">
                        <div class="preview-img" id="previewAvatar">?</div>
                        <div>
                            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
                            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">Escolher Imagem</button>
                            <div class="field-hint">JPEG, PNG ou WebP · máx 2MB</div>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label>Nome</label>
                    <input type="text" id="editName" placeholder="O teu nome" />
                </div>

                <div class="field">
                    <label>Bio</label>
                    <textarea id="editBio" rows="3" placeholder="Conta algo sobre ti..."></textarea>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="closeEditModal()">Cancelar</button>
                    <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">Guardar</button>
                </div>
            </div>
         </div>

        <!-- Notificações -->
        <div id="toastContainer"></div>

        <script src="../js/config.js"></script>
        <script src="../js/auth.js"></script>
        <script src="../js/profile.js"></script>
    </body>
</html>
