<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBookshelf - Registar</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="icon" type="image/png" href="../assets/Bookshelf_Icon.png">
</head>
<body>
    <div class="inner">

        <div class="logo-text">
            <img src="../assets/Bookshelf_Icon.png" alt="logo">
            <span class="logo-title">My<span class="logo-det">B</span>ookshelf</span>
        </div>
        <div class="tagline">O teu clube literário, sempre contigo.</div>

        <div class="card">
            <div class="card-title">Criar conta</div>
            <div class="card-sub">Junta-te à comunidade de leitores</div>

            <form id="register-form">
                <div class="avatar-upload">
                    <div class="avatar-preview">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                        </svg>
                        <img id="avatar-img" src="" alt="avatar">
                    </div>
                    <div>
                        <button type="button" class="avatar-btn" onclick="document.getElementById('avatar-input').click()">Escolher foto</button>
                        <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp">
                        <p class="avatar-hint">Opcional · JPEG, PNG, WebP</p>
                    </div>
                </div>

                <div class="field">
                    <label for="name">Nome</label>
                    <input type="text" id="name" placeholder="O teu nome" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="o_teu@email.com" required>
                </div>
                <div class="field">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <button type="submit" class="btn" id="btn">Criar conta</button>
            </form>

            <div class="msg" id="msg"></div>

            <div class="link-row">Já tens conta? <a href="login.html">Entrar</a></div>
        </div>

        <div class="footer-text">Junta-te a clubes, descobre leituras e conecta-te com outros leitores.</div>
    </div>

    <script src="../js/register.js" defer></script>
</body>
</html>
