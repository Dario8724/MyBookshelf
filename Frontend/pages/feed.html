<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBookshelf — Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/feed.css">
</head>
<body>

    <nav>
        <a href="profile.html" class="logo-text">My<span class="logo-det">B</span>ookshelf</a>
        
       <div class="nav-center">
            <a href="feed.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Feed</span>
            </a>
            <a href="clubs.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span>Clubes</span>
            </a>
            <a href="search.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Buscar</span>
            </a>
            <a href="following.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Seguindo</span>
            </a>
       </div>

       <div class="nav-right">
            <a href="profile.html" class="nav-avatar" id="navAvatar">G</a>
            <button class="btn-logout" onclick="logout()" title="Sair">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
       </div>
    </nav>

    <div class="page">

        <!--CRIAR POST-->
        <div class="card create-post">
            <div class="create-top">
                <div class="create-avatar" id="createAvatar">G</div>
                <textarea id="postContent" placeholder="Partilha algo com os teus seguidores..." rows="4"></textarea>
            </div>
            <div class="create-bottom">
                <span class="char-count" id="charCount">0/500</span>
                <button class="btn btn-primary" id="postBtn" onclick="createPost()">Publicar</button>
            </div>
        </div>

        <!--LOADING-->
        <div class="feed-loading" id="feedLoading">
            <div class="spinner"></div>
            <p>A carregar feed...</p>
        </div>

        <!--Posts-->
        <div id="feedContainer" style="display:none"></div>

        <!--Empty-->
        <div class="feed-empty" id="feedEmpty" style="display:none">
            <div class="empty-icon">📚</div>
            <p>Ainda não há posts no teu feed.</p>
            <p class="empty-sub">Segue outros leitores para ver as suas publicações aqui!</p>
            <a href="search.html" class="btn btb-outline" style="margin-top:1rem;">Descobrir leitores</a>
        </div>
    
    </div>

    <!--Modal Comentários-->
    <div class="overlay" id="commentsOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Comentários</div>
                <button class="modal-close" onclick="closeComments()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="comments-list" id="commentsList"></div>
            <div class="comment-input">
                <textarea id="commentContent" placeholder="Escreve um comentário..." rows="2"></textarea>
                <button class="btn btn-primary" onclick="submitComment()">Enviar</button>
            </div>
        </div>
    </div>
    
    <div id="toastContainer"></div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/feed.js"></script>  
</body>
</html>
