<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBookshelf - Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="icon" type="image/png" href="../assets/Bookshelf_Icon.png">
</head>
<body>
    <div class="inner">

        <div class="logo-text">
            <img src="../assets/Bookshelf_Icon.png" alt="logo">
            <span class="logo-title">My<span class="logo-det">B</span>ookshelf</span>
        </div>
        <div class="tagline">O teu clube literário, sempre contigo.</div>

        <div class="card">
            <div class="card-title">Entrar</div>
            <div class="card-sub">Entre com a sua conta para aceder à biblioteca</div>

            <form id="login-form">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="o_teu@email.com" required>
                </div>
                <div class="field">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" id="btn">Entrar</button>
            </form>

            <div class="msg" id="msg"></div>

            <div class="link-row">Não tens conta? <a href="register.html">Registar</a></div>
        </div>

        <div class="footer-text">Junta-te a clubes, descobre leituras e conecta-te com outros leitores.</div>
    </div>

    <script src="../js/login.js" defer></script>
</body>
</html>
