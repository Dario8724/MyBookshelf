<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBookshelf</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:       #F5F0E8;
            --surface:  #EDE8DC;
            --border:   #D4CBBA;
            --text:     #2C2A24;
            --muted:    #8A8070;
            --subtle:   #6a6358;
            --accent:   #C07B3A;
            --accent-dk:#A86A31;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            text-align: center;
            padding: 2rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            cursor: pointer;
            padding: 1rem 2rem;
            border-radius: 16px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .logo-container:hover {
            background: var(--surface);
            transform: scale(1.02);
        }

        .logo-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* Fallback caso a imagem não carregue - desenha um ícone de estante */
        .logo-icon-fallback {
            width: 90px;
            height: 90px;
            background: var(--accent);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 3.5rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 5rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .logo-det {
            color: var(--accent);
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--muted);
            max-width: 600px;
            line-height: 1.5;
            margin-top: 0.5rem;
        }

        /* Subtle pulse animation no logo para chamar atenção do cursor */
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        .logo-container {
            animation: subtlePulse 3s ease-in-out infinite;
        }

        .logo-container:hover {
            animation: none;
        }

        /* Responsive para diferentes tamanhos de gravação */
        @media (max-width: 768px) {
            .logo-text { font-size: 3rem; }
            .logo-icon, .logo-icon-fallback { width: 60px; height: 60px; }
            .logo-icon-fallback { font-size: 2.5rem; }
            .tagline { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="logo-container" id="logo">
            <!-- Substitui o src pelo caminho real do teu Bookshelf_Icon.png se quiseres -->
            <img src="../assets/Bookshelf_Icon.png"
                 alt="MyBookshelf logo"
                 class="logo-icon"
                 onerror="this.outerHTML='<div class=&quot;logo-icon-fallback&quot;>B</div>'">
            <span class="logo-text">My<span class="logo-det">B</span>ookshelf</span>
        </div>
        <p class="tagline">A rede social para leitores</p>
    </div>
</body>
</html>
